sonar.projectKey=audaciously
sonar.sources=src
# Point SonarQube at the app tsconfig so it resolves the full lib chain
# (ES2022 via @vue/tsconfig/tsconfig.dom.json). The root tsconfig.json is a
# bare project-references container with no compilerOptions, which causes
# SonarQube to fall back to ES5 defaults and flag ES2021+ APIs like replaceAll.
sonar.typescript.tsconfigPaths=tsconfig.app.json,tsconfig.node.json
