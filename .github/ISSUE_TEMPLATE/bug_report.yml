name: Bug Report
description: Something broke or behaves unexpectedly.
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. The more detail you include, the faster it gets fixed.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear summary of what went wrong.
      placeholder: e.g. "Exporting to MP3 silently produces an empty file when the project has no recorded nodes."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: The exact sequence that triggers the bug.
      placeholder: |
        1. Open a project with at least one piano node
        2. Click Export → MP3
        3. Save the file and open it — it plays silence
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include any console errors if present.
    validations:
      required: true

  - type: dropdown
    id: browser
    attributes:
      label: Browser(s)
      description: Which browsers show the problem?
      multiple: true
      options:
        - Chrome
        - Firefox
        - Safari
        - Edge
        - Other
    validations:
      required: true

  - type: input
    id: browser-version
    attributes:
      label: Browser Version
      placeholder: e.g. Chrome 124

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Screenshots, console output, a `.awp` project file that reproduces the issue — anything that helps.
